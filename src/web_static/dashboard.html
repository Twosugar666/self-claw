<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>XiaoWe · 概览</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script>
tailwind.config = { theme: { extend: { colors: {
  warm: { 50:'#fdf8f6',100:'#f2e8e5',200:'#eaddd7',300:'#e0cfc7',400:'#d2bab0',500:'#bfa094',600:'#a18072',700:'#977669',800:'#846358',900:'#43302b' }
}}}}
</script>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fdf8f6; }
</style>
</head>
<body class="pb-20" x-data="dashApp()" x-init="load()">
  <!-- 顶部 -->
  <div class="bg-white border-b border-warm-100 px-4 py-4 flex items-center justify-between">
    <div>
      <h1 class="text-lg font-bold text-warm-900" x-text="greeting"></h1>
      <p class="text-sm text-warm-500" x-text="dateStr"></p>
    </div>
    <a href="/web/settings" class="text-xl text-warm-400 hover:text-warm-600 transition">⚙️</a>
  </div>

  <div class="p-4 space-y-4" x-show="!loading">

    <!-- 公告横幅 -->
    <template x-if="announcements && announcements.length">
      <div class="bg-blue-50 border border-blue-100 rounded-xl p-3">
        <div class="flex items-center gap-2">
          <span class="text-blue-500 text-sm">📢</span>
          <p class="text-sm text-blue-800 flex-1 line-clamp-2" x-text="announcements[0].content"></p>
        </div>
        <template x-if="announcements.length > 1">
          <p class="text-xs text-blue-400 mt-1 text-right cursor-pointer" @click="showAllAnn = !showAllAnn">
            还有 <span x-text="announcements.length - 1"></span> 条 ›
          </p>
        </template>
        <template x-if="showAllAnn">
          <div class="mt-2 space-y-1">
            <template x-for="a in announcements.slice(1)" :key="a.id">
              <p class="text-xs text-blue-700 border-t border-blue-100 pt-1" x-text="a.content"></p>
            </template>
          </div>
        </template>
      </div>
    </template>

    <!-- 统计卡片行 -->
    <div class="grid grid-cols-2 gap-3">
      <div class="bg-white rounded-xl p-4 shadow-sm">
        <p class="text-xs text-warm-500">今日速记</p>
        <p class="text-2xl font-bold text-warm-800" x-text="data.note_count_today || 0"></p>
      </div>
      <div class="bg-white rounded-xl p-4 shadow-sm">
        <p class="text-xs text-warm-500">待办进度</p>
        <p class="text-2xl font-bold text-warm-800"><span x-text="data.todo_done||0"></span>/<span x-text="data.todo_total||0"></span></p>
        <div class="mt-1 bg-warm-100 rounded-full h-1.5 overflow-hidden">
          <div class="bg-warm-600 h-full rounded-full transition-all" :style="`width:${data.todo_total?Math.round(data.todo_done/data.todo_total*100):0}%`"></div>
        </div>
      </div>
      <div class="bg-white rounded-xl p-4 shadow-sm">
        <p class="text-xs text-warm-500">连续打卡</p>
        <p class="text-2xl font-bold text-warm-800"><span x-text="data.streak||0"></span> <span class="text-sm font-normal">天</span></p>
      </div>
      <a href="/web/memory" class="bg-white rounded-xl p-4 shadow-sm block hover:shadow-md transition">
        <p class="text-xs text-warm-500">🧠 记忆</p>
        <template x-if="data.memory_summary">
          <p class="text-sm font-medium text-warm-700"><span x-text="data.memory_summary.sections"></span> 类 · <span x-text="data.memory_summary.items"></span> 条</p>
        </template>
        <template x-if="!data.memory_summary">
          <p class="text-sm text-warm-400">暂无记忆</p>
        </template>
      </a>
    </div>

    <!-- Daily Top 3 -->
    <div x-show="data.daily_top3 && data.daily_top3.length" class="bg-white rounded-xl p-4 shadow-sm">
      <p class="text-sm font-medium text-warm-700 mb-2">🎯 今日重点</p>
      <div class="space-y-1.5">
        <template x-for="(item, i) in (data.daily_top3 || [])" :key="i">
          <p class="text-sm text-warm-600 flex items-center gap-2">
            <span class="w-5 h-5 rounded-full bg-warm-100 text-warm-600 text-xs flex items-center justify-center font-medium" x-text="i+1"></span>
            <span x-text="typeof item === 'string' ? item : item.content || item.text || ''"></span>
          </p>
        </template>
      </div>
    </div>

    <!-- 当前在读/在看 -->
    <div class="grid grid-cols-2 gap-3" x-show="data.active_book || data.active_media">
      <template x-if="data.active_book">
        <a href="/web/archive?category=book" class="bg-white rounded-xl p-3 shadow-sm block hover:shadow-md transition">
          <p class="text-xs text-warm-500">📚 在读</p>
          <p class="text-sm font-medium text-warm-700 line-clamp-1" x-text="typeof data.active_book === 'string' ? data.active_book : data.active_book.name || ''"></p>
        </a>
      </template>
      <template x-if="data.active_media">
        <a href="/web/archive?category=media" class="bg-white rounded-xl p-3 shadow-sm block hover:shadow-md transition">
          <p class="text-xs text-warm-500">🎬 在看</p>
          <p class="text-sm font-medium text-warm-700 line-clamp-1" x-text="typeof data.active_media === 'string' ? data.active_media : data.active_media.name || ''"></p>
        </a>
      </template>
    </div>

    <!-- 情绪曲线（可点击进入情绪页） -->
    <a href="/web/mood" class="block" x-show="data.mood_chart && data.mood_chart.length">
      <div class="bg-white rounded-xl p-4 shadow-sm hover:shadow-md transition">
        <p class="text-sm font-medium text-warm-700 mb-3">近 7 天情绪 <span class="text-xs text-warm-400">→ 查看详情</span></p>
        <div style="position: relative; height: 120px;">
          <canvas id="moodChart"></canvas>
        </div>
      </div>
    </a>

    <!-- 最近速记（可点击进入速记页） -->
    <a href="/web/notes" class="block" x-show="data.recent_notes && data.recent_notes.length">
      <div class="bg-white rounded-xl p-4 shadow-sm hover:shadow-md transition">
        <p class="text-sm font-medium text-warm-700 mb-3">最近速记 <span class="text-xs text-warm-400">→ 查看全部</span></p>
        <div class="space-y-2">
          <template x-for="n in data.recent_notes" :key="n">
            <p class="text-xs text-warm-600 border-l-2 border-warm-200 pl-2 line-clamp-2" x-text="n"></p>
          </template>
        </div>
      </div>
    </a>

    <!-- 更多功能九宫格 -->
    <div x-show="hasMoreFeatures" class="bg-white rounded-xl p-4 shadow-sm">
      <p class="text-sm font-medium text-warm-700 mb-3">更多</p>
      <div class="grid grid-cols-3 gap-3">
        <template x-if="data.pending_decisions_count > 0">
          <a href="/web/decisions" class="flex flex-col items-center gap-1 p-2 rounded-lg hover:bg-warm-50 transition">
            <span class="text-2xl">🎯</span>
            <span class="text-xs text-warm-600">决策</span>
            <span class="text-xs text-warm-400" x-text="data.pending_decisions_count + '个待复盘'"></span>
          </a>
        </template>
        <template x-if="data.reflect_streak > 0">
          <a href="/web/reflect" class="flex flex-col items-center gap-1 p-2 rounded-lg hover:bg-warm-50 transition">
            <span class="text-2xl">🔮</span>
            <span class="text-xs text-warm-600">自问</span>
            <span class="text-xs text-warm-400" x-text="'连续' + data.reflect_streak + '天'"></span>
          </a>
        </template>
        <template x-if="data.active_experiment">
          <a href="/web/habits" class="flex flex-col items-center gap-1 p-2 rounded-lg hover:bg-warm-50 transition">
            <span class="text-2xl">🌱</span>
            <span class="text-xs text-warm-600">习惯</span>
            <span class="text-xs text-warm-400" x-text="data.active_experiment.progress + '%'"></span>
          </a>
        </template>
        <!-- 始终显示的入口 -->
        <a href="/web/decisions" class="flex flex-col items-center gap-1 p-2 rounded-lg hover:bg-warm-50 transition" x-show="!data.pending_decisions_count">
          <span class="text-2xl">🎯</span>
          <span class="text-xs text-warm-600">决策</span>
        </a>
        <a href="/web/reflect" class="flex flex-col items-center gap-1 p-2 rounded-lg hover:bg-warm-50 transition" x-show="!data.reflect_streak">
          <span class="text-2xl">🔮</span>
          <span class="text-xs text-warm-600">自问</span>
        </a>
        <a href="/web/habits" class="flex flex-col items-center gap-1 p-2 rounded-lg hover:bg-warm-50 transition" x-show="!data.active_experiment">
          <span class="text-2xl">🌱</span>
          <span class="text-xs text-warm-600">习惯</span>
        </a>
      </div>
    </div>

    <!-- 空状态引导 -->
    <div x-show="!data.note_count_today && !data.todo_total && !(data.mood_chart && data.mood_chart.length)" class="bg-white rounded-xl p-6 shadow-sm text-center">
      <p class="text-3xl mb-3">👋</p>
      <p class="text-sm font-medium text-warm-800 mb-2">欢迎使用 XiaoWe</p>
      <p class="text-xs text-warm-500 mb-4 leading-relaxed">在企微和 XiaoWe 聊天，你的生活碎片会自动记录在这里</p>
      <div class="space-y-2 text-xs text-warm-600">
        <p>💡 试试和 XiaoWe 说：</p>
        <p class="bg-warm-50 rounded-lg px-3 py-2">"今天面试很顺利"</p>
        <p class="bg-warm-50 rounded-lg px-3 py-2">"提醒我明天买猫粮"</p>
        <p class="bg-warm-50 rounded-lg px-3 py-2">"帮我回顾最近的情绪"</p>
      </div>
    </div>
  </div>

  <div x-show="loading" class="p-4 space-y-4 animate-pulse">
    <div class="h-8 bg-warm-100 rounded w-48"></div>
    <div class="grid grid-cols-2 gap-3">
      <div class="h-20 bg-warm-100 rounded-xl"></div>
      <div class="h-20 bg-warm-100 rounded-xl"></div>
      <div class="h-20 bg-warm-100 rounded-xl"></div>
      <div class="h-20 bg-warm-100 rounded-xl"></div>
    </div>
    <div class="h-40 bg-warm-100 rounded-xl"></div>
    <div class="grid grid-cols-3 gap-3">
      <div class="h-16 bg-warm-100 rounded-xl"></div>
      <div class="h-16 bg-warm-100 rounded-xl"></div>
      <div class="h-16 bg-warm-100 rounded-xl"></div>
    </div>
  </div>

  <!-- 底部导航 -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-warm-100 flex justify-around py-2 text-xs">
    <a href="/web/dashboard" class="flex flex-col items-center text-warm-700 font-medium"><span class="text-lg">📊</span>概览</a>
    <a href="/web/notes" class="flex flex-col items-center text-warm-400"><span class="text-lg">📝</span>速记</a>
    <a href="/web/todos" class="flex flex-col items-center text-warm-400"><span class="text-lg">✅</span>待办</a>
    <a href="/web/daily" class="flex flex-col items-center text-warm-400"><span class="text-lg">📖</span>日记</a>
    <a href="/web/archive" class="flex flex-col items-center text-warm-400"><span class="text-lg">📁</span>笔记</a>
  </nav>

<script>
const API_HEADERS = () => ({'X-Token': localStorage.getItem('xiaowe_token')||''});
function checkAuth() { if(!localStorage.getItem('xiaowe_token')) location.href='/web/login'; }

function dashApp() {
  return {
    data: {}, loading: true, greeting: '', dateStr: '',
    announcements: [], showAllAnn: false,
    get hasMoreFeatures() {
      return true; // always show the grid for easy navigation
    },
    async load() {
      checkAuth();
      const nn = localStorage.getItem('xiaowe_nickname') || '';
      this.greeting = `Hi, ${nn || '你好'}！`;
      const now = new Date();
      const wd = ['周日','周一','周二','周三','周四','周五','周六'][now.getDay()];
      this.dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${wd}`;
      try {
        const [dashRes, annRes] = await Promise.all([
          fetch('/api/dashboard', {headers: API_HEADERS()}),
          fetch('/api/announcements', {headers: API_HEADERS()}).catch(() => null),
        ]);
        if (dashRes.status === 401) { localStorage.removeItem('xiaowe_token'); location.href='/web/login'; return; }
        this.data = await dashRes.json();
        if (annRes && annRes.ok) {
          const annData = await annRes.json();
          this.announcements = annData.announcements || [];
        }
        this.$nextTick(() => this.renderChart());
      } catch(e) { console.error(e); }
      this.loading = false;
    },
    renderChart() {
      const mc = this.data.mood_chart || [];
      if (!mc.length) return;
      const ctx = document.getElementById('moodChart');
      if (!ctx) return;
      const existing = Chart.getChart(ctx);
      if (existing) existing.destroy();
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: mc.map(s => s.date ? s.date.slice(5) : ''),
          datasets: [{
            data: mc.map(s => s.score),
            borderColor: '#977669', backgroundColor: 'rgba(151,118,105,0.1)',
            fill: true, tension: 0.4, pointRadius: 4, pointBackgroundColor: '#977669'
          }]
        },
        options: {
          plugins: { legend: { display: false } },
          scales: { y: { min: 1, max: 10, ticks: { stepSize: 1 } } },
          responsive: true, maintainAspectRatio: false
        }
      });
    }
  }
}
</script>
</body>
</html>
