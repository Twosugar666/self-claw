<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>XiaoWe · 决策追踪</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script>
tailwind.config = { theme: { extend: { colors: {
  warm: { 50:'#fdf8f6',100:'#f2e8e5',200:'#eaddd7',300:'#e0cfc7',400:'#d2bab0',500:'#bfa094',600:'#a18072',700:'#977669',800:'#846358',900:'#43302b' }
}}}}
</script>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fdf8f6; }
</style>
</head>
<body class="pb-20" x-data="decisionsApp()" x-init="load()">

  <!-- 顶部 -->
  <div class="bg-white border-b border-warm-100 px-4 py-4 flex items-center gap-3">
    <a href="/web/dashboard" class="text-warm-400 hover:text-warm-600 text-lg">←</a>
    <h1 class="text-lg font-bold text-warm-900">🎯 决策追踪</h1>
  </div>

  <div class="p-4 space-y-4" x-show="!loading">

    <!-- 统计 -->
    <div class="grid grid-cols-3 gap-3" x-show="stats.total > 0">
      <div class="bg-white rounded-xl p-3 shadow-sm text-center">
        <p class="text-xs text-warm-500">总决策</p>
        <p class="text-xl font-bold text-warm-800" x-text="stats.total"></p>
      </div>
      <div class="bg-white rounded-xl p-3 shadow-sm text-center">
        <p class="text-xs text-warm-500">待复盘</p>
        <p class="text-xl font-bold text-amber-600" x-text="stats.pending_count"></p>
      </div>
      <div class="bg-white rounded-xl p-3 shadow-sm text-center">
        <p class="text-xs text-warm-500">平均满意度</p>
        <p class="text-xl font-bold text-warm-800" x-text="stats.avg_satisfaction ? stats.avg_satisfaction + '/10' : '-'"></p>
      </div>
    </div>

    <!-- Tab 切换 -->
    <div class="flex bg-white rounded-xl shadow-sm overflow-hidden" x-show="stats.total > 0">
      <button @click="tab='pending'" :class="tab==='pending' ? 'bg-warm-700 text-white' : 'text-warm-600'"
        class="flex-1 py-2.5 text-sm font-medium transition">
        待复盘 <span class="text-xs opacity-75" x-text="'(' + pending.length + ')'"></span>
      </button>
      <button @click="tab='history'" :class="tab==='history' ? 'bg-warm-700 text-white' : 'text-warm-600'"
        class="flex-1 py-2.5 text-sm font-medium transition">
        已复盘 <span class="text-xs opacity-75" x-text="'(' + history.length + ')'"></span>
      </button>
    </div>

    <!-- 待复盘列表 -->
    <div x-show="tab==='pending'" class="space-y-3">
      <template x-for="(d, i) in pending" :key="d.id || i">
        <div class="bg-white rounded-xl p-4 shadow-sm">
          <div class="flex items-start justify-between mb-2">
            <p class="text-sm font-medium text-warm-800" x-text="d.topic || d.title"></p>
            <span class="text-xs text-amber-600 bg-amber-50 px-2 py-0.5 rounded-full whitespace-nowrap">待复盘</span>
          </div>
          <template x-if="d.decision">
            <p class="text-xs text-warm-500 mb-2 line-clamp-2" x-text="d.decision"></p>
          </template>
          <div class="flex flex-wrap gap-2 text-xs text-warm-500 mb-2">
            <span x-text="'📅 ' + (d.date || '')"></span>
            <span x-show="d.review_date" x-text="'⏰ 复盘日 ' + (d.review_date || '')"></span>
          </div>
          <template x-if="d.chosen">
            <p class="text-sm text-warm-700 mb-1">选择：<span class="font-medium" x-text="d.chosen"></span></p>
          </template>
          <template x-if="d.tags && d.tags.length">
            <div class="flex gap-1 mt-2">
              <template x-for="tag in d.tags" :key="tag">
                <span class="text-xs bg-warm-100 text-warm-600 px-2 py-0.5 rounded-full" x-text="tag"></span>
              </template>
            </div>
          </template>
          <!-- 展开详情 -->
          <div x-data="{expanded: false}">
            <button @click="expanded = !expanded" class="text-xs text-warm-400 mt-2 hover:text-warm-600" x-text="expanded ? '收起 ▲' : '展开详情 ▼'"></button>
            <div x-show="expanded" x-transition class="mt-2 space-y-2 text-sm text-warm-600">
              <template x-if="d.decision">
                <div>
                  <p class="text-xs text-warm-400 mb-1">决策内容</p>
                  <p class="leading-relaxed" x-text="d.decision"></p>
                </div>
              </template>
              <template x-if="d.emotion">
                <div>
                  <p class="text-xs text-warm-400 mb-1">当时情绪</p>
                  <p x-text="d.emotion"></p>
                </div>
              </template>
              <div class="text-xs text-warm-400">
                📅 预计复盘：<span x-text="d.review_date || '未设置'"></span>
              </div>
            </div>
          </div>
        </div>
      </template>
      <div x-show="pending.length === 0" class="text-center py-8 text-warm-400 text-sm">暂无待复盘的决策</div>
    </div>

    <!-- 已复盘列表 -->
    <div x-show="tab==='history'" class="space-y-3">
      <template x-for="(d, i) in history" :key="d.id || i">
        <div class="bg-white rounded-xl p-4 shadow-sm">
          <div class="flex items-start justify-between mb-2">
            <p class="text-sm font-medium text-warm-800" x-text="d.topic || d.title"></p>
            <template x-if="d.review && d.review.satisfaction">
              <span class="text-xs text-warm-600 bg-warm-100 px-2 py-0.5 rounded-full whitespace-nowrap" x-text="'⭐ ' + d.review.satisfaction + '/10'"></span>
            </template>
          </div>
          <div class="flex flex-wrap gap-2 text-xs text-warm-500 mb-2">
            <span x-text="'📅 决策 ' + (d.date || '')"></span>
            <span x-show="d.review && d.review.date" x-text="'📝 复盘 ' + (d.review ? d.review.date : '')"></span>
          </div>
          <template x-if="d.chosen">
            <p class="text-sm text-warm-600 mb-1">选择：<span x-text="d.chosen"></span></p>
          </template>
          <template x-if="d.review">
            <div class="mt-2 bg-warm-50 rounded-lg p-3 space-y-1">
              <template x-if="d.review.outcome">
                <div>
                  <p class="text-xs text-warm-400">结果</p>
                  <p class="text-sm text-warm-700" x-text="d.review.outcome"></p>
                </div>
              </template>
              <template x-if="d.review.lessons">
                <div>
                  <p class="text-xs text-warm-400">教训</p>
                  <p class="text-sm text-warm-700" x-text="d.review.lessons"></p>
                </div>
              </template>
            </div>
          </template>
        </div>
      </template>
      <div x-show="history.length === 0" class="text-center py-8 text-warm-400 text-sm">暂无已复盘的决策</div>
    </div>

    <!-- 空状态 -->
    <div x-show="stats.total === 0" class="bg-white rounded-xl p-6 shadow-sm text-center">
      <p class="text-3xl mb-3">🎯</p>
      <p class="text-sm font-medium text-warm-800 mb-2">还没有记录决策</p>
      <p class="text-xs text-warm-500 leading-relaxed">在企微告诉管家你面临的选择，<br>他会帮你记录和跟踪。</p>
      <p class="mt-3 bg-warm-50 rounded-lg px-3 py-2 text-xs text-warm-600">"我在纠结要不要换工作"</p>
    </div>
  </div>

  <div x-show="loading" class="flex items-center justify-center h-64">
    <p class="text-warm-400">加载中...</p>
  </div>

  <!-- 底部导航 -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-warm-100 flex justify-around py-2 text-xs">
    <a href="/web/dashboard" class="flex flex-col items-center text-warm-400"><span class="text-lg">📊</span>概览</a>
    <a href="/web/notes" class="flex flex-col items-center text-warm-400"><span class="text-lg">📝</span>速记</a>
    <a href="/web/todos" class="flex flex-col items-center text-warm-400"><span class="text-lg">✅</span>待办</a>
    <a href="/web/daily" class="flex flex-col items-center text-warm-400"><span class="text-lg">📖</span>日记</a>
    <a href="/web/archive" class="flex flex-col items-center text-warm-400"><span class="text-lg">📁</span>笔记</a>
  </nav>

<script>
const API_HEADERS = () => ({'X-Token': localStorage.getItem('xiaowe_token')||''});
function checkAuth() { if(!localStorage.getItem('xiaowe_token')) location.href='/web/login'; }

function decisionsApp() {
  return {
    loading: true, tab: 'pending',
    pending: [], history: [],
    stats: { total: 0, pending_count: 0, reviewed_count: 0, avg_satisfaction: null },
    async load() {
      checkAuth();
      try {
        const res = await fetch('/api/decisions', {headers: API_HEADERS()});
        if (res.status === 401) { localStorage.removeItem('xiaowe_token'); location.href='/web/login'; return; }
        const d = await res.json();
        this.pending = d.pending || [];
        this.history = d.history || [];
        this.stats = d.stats || this.stats;
        if (this.pending.length === 0 && this.history.length > 0) this.tab = 'history';
      } catch(e) { console.error(e); }
      this.loading = false;
    }
  }
}
</script>
</body>
</html>
