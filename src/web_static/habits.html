<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>XiaoWe · 微习惯实验</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script>
tailwind.config = { theme: { extend: { colors: {
  warm: { 50:'#fdf8f6',100:'#f2e8e5',200:'#eaddd7',300:'#e0cfc7',400:'#d2bab0',500:'#bfa094',600:'#a18072',700:'#977669',800:'#846358',900:'#43302b' }
}}}}
</script>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fdf8f6; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-cell { width: 100%; aspect-ratio: 1; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; }
</style>
</head>
<body class="pb-20" x-data="habitsApp()" x-init="load()">

  <!-- 顶部 -->
  <div class="bg-white border-b border-warm-100 px-4 py-4 flex items-center gap-3">
    <a href="/web/dashboard" class="text-warm-400 hover:text-warm-600 text-lg">←</a>
    <h1 class="text-lg font-bold text-warm-900">🌱 微习惯实验</h1>
  </div>

  <div class="p-4 space-y-4" x-show="!loading">

    <!-- 统计 -->
    <div class="grid grid-cols-3 gap-3" x-show="stats.total_experiments > 0">
      <div class="bg-white rounded-xl p-3 shadow-sm text-center">
        <p class="text-xs text-warm-500">实验总数</p>
        <p class="text-xl font-bold text-warm-800" x-text="stats.total_experiments"></p>
      </div>
      <div class="bg-white rounded-xl p-3 shadow-sm text-center">
        <p class="text-xs text-warm-500">已完成</p>
        <p class="text-xl font-bold text-green-600" x-text="stats.completed"></p>
      </div>
      <div class="bg-white rounded-xl p-3 shadow-sm text-center">
        <p class="text-xs text-warm-500">平均完成率</p>
        <p class="text-xl font-bold text-warm-800" x-text="stats.avg_completion_rate !== null ? stats.avg_completion_rate + '%' : '-'"></p>
      </div>
    </div>

    <!-- 当前实验 -->
    <template x-if="active">
      <div class="bg-white rounded-xl p-4 shadow-sm">
        <div class="flex items-center justify-between mb-3">
          <p class="text-sm font-medium text-warm-700">🏃 当前实验</p>
          <span class="text-xs bg-green-50 text-green-600 px-2 py-0.5 rounded-full">进行中</span>
        </div>
        <p class="text-base font-bold text-warm-900 mb-2" x-text="active.name"></p>
        <div class="flex items-center gap-2 text-xs text-warm-500 mb-3">
          <span x-text="'开始 ' + (active.start_date || '')"></span>
          <span x-text="'· 目标 ' + (active.target_days || 0) + ' 天'"></span>
        </div>

        <!-- 进度条 -->
        <div class="mb-3">
          <div class="flex justify-between text-xs text-warm-500 mb-1">
            <span x-text="'第 ' + doneDays + ' / ' + (active.target_days || 0) + ' 天'"></span>
            <span x-text="progressPct + '%'"></span>
          </div>
          <div class="bg-warm-100 rounded-full h-3 overflow-hidden">
            <div class="bg-green-500 h-full rounded-full transition-all" :style="`width: ${progressPct}%`"></div>
          </div>
        </div>

        <!-- 日历视图 -->
        <div class="mb-2">
          <div class="cal-grid text-xs text-warm-400 mb-1">
            <div class="text-center">一</div><div class="text-center">二</div><div class="text-center">三</div>
            <div class="text-center">四</div><div class="text-center">五</div><div class="text-center">六</div>
            <div class="text-center">日</div>
          </div>
          <div class="cal-grid">
            <template x-for="cell in calendarCells" :key="cell.key">
              <div class="cal-cell" :class="cell.cls" x-text="cell.label"></div>
            </template>
          </div>
        </div>

        <!-- 最近打卡记录 -->
        <template x-if="active.progress && active.progress.length > 0">
          <div class="mt-3 border-t border-warm-100 pt-3">
            <p class="text-xs text-warm-500 mb-2">最近记录</p>
            <div class="space-y-1">
              <template x-for="p in active.progress.slice(-5).reverse()" :key="p.date">
                <div class="flex items-center gap-2 text-xs">
                  <span :class="p.done ? 'text-green-500' : 'text-warm-300'" x-text="p.done ? '✅' : '⬜'"></span>
                  <span class="text-warm-600" x-text="p.date"></span>
                  <span x-show="p.note" class="text-warm-400 flex-1 truncate" x-text="p.note"></span>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>
    </template>

    <!-- 历史实验 -->
    <div x-show="history.length > 0">
      <p class="text-sm font-medium text-warm-700 mb-3">历史实验</p>
      <div class="space-y-3">
        <template x-for="(h, i) in history" :key="h.name + '-' + i">
          <div class="bg-white rounded-xl p-4 shadow-sm">
            <div class="flex items-start justify-between mb-1">
              <p class="text-sm font-medium text-warm-800" x-text="h.name"></p>
              <span class="text-xs px-2 py-0.5 rounded-full" :class="h.completed ? 'bg-green-50 text-green-600' : 'bg-warm-100 text-warm-500'" x-text="h.completed ? '✅ 完成' : '⏸ 中止'"></span>
            </div>
            <div class="flex items-center gap-3 text-xs text-warm-500">
              <span x-text="calcHistRate(h)"></span>
              <span x-text="(h.start_date || '') + ' ~ ' + (h.end_date || '')"></span>
            </div>
            <!-- mini 进度条 -->
            <div class="mt-2 bg-warm-100 rounded-full h-1.5 overflow-hidden">
              <div class="h-full rounded-full transition-all" :class="h.completed ? 'bg-green-400' : 'bg-warm-400'" :style="`width: ${calcHistPct(h)}%`"></div>
            </div>
          </div>
        </template>
      </div>
    </div>

    <!-- 空状态 -->
    <div x-show="!active && history.length === 0" class="bg-white rounded-xl p-6 shadow-sm text-center">
      <p class="text-3xl mb-3">🌱</p>
      <p class="text-sm font-medium text-warm-800 mb-2">还没有微习惯实验</p>
      <p class="text-xs text-warm-500 leading-relaxed">在企微告诉管家你想养成的习惯，<br>他会帮你设计一个小实验。</p>
      <p class="mt-3 bg-warm-50 rounded-lg px-3 py-2 text-xs text-warm-600">"我想每天早上冥想5分钟"</p>
    </div>
  </div>

  <div x-show="loading" class="flex items-center justify-center h-64">
    <p class="text-warm-400">加载中...</p>
  </div>

  <!-- 底部导航 -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-warm-100 flex justify-around py-2 text-xs">
    <a href="/web/dashboard" class="flex flex-col items-center text-warm-400"><span class="text-lg">📊</span>概览</a>
    <a href="/web/notes" class="flex flex-col items-center text-warm-400"><span class="text-lg">📝</span>速记</a>
    <a href="/web/todos" class="flex flex-col items-center text-warm-400"><span class="text-lg">✅</span>待办</a>
    <a href="/web/daily" class="flex flex-col items-center text-warm-400"><span class="text-lg">📖</span>日记</a>
    <a href="/web/archive" class="flex flex-col items-center text-warm-400"><span class="text-lg">📁</span>笔记</a>
  </nav>

<script>
const API_HEADERS = () => ({'X-Token': localStorage.getItem('xiaowe_token')||''});
function checkAuth() { if(!localStorage.getItem('xiaowe_token')) location.href='/web/login'; }

function habitsApp() {
  return {
    loading: true, active: null, history: [],
    stats: { total_experiments: 0, completed: 0, avg_completion_rate: null },

    get doneDays() {
      if (!this.active || !this.active.progress) return 0;
      return this.active.progress.filter(p => p.done).length;
    },
    get progressPct() {
      if (!this.active) return 0;
      const target = this.active.target_days || 1;
      return Math.min(100, Math.round(this.doneDays / target * 100));
    },
    get calendarCells() {
      if (!this.active || !this.active.start_date) return [];
      const progress = this.active.progress || [];
      const doneSet = new Set(progress.filter(p => p.done).map(p => p.date));
      const failSet = new Set(progress.filter(p => !p.done).map(p => p.date));

      const start = new Date(this.active.start_date + 'T00:00:00');
      const target = this.active.target_days || 21;
      const end = new Date(start); end.setDate(end.getDate() + target - 1);
      const today = new Date(); today.setHours(0,0,0,0);

      // 对齐到周一
      const firstDay = new Date(start);
      const dow = firstDay.getDay() || 7; // 1=Mon..7=Sun
      firstDay.setDate(firstDay.getDate() - (dow - 1));

      const cells = [];
      const cur = new Date(firstDay);
      const endPad = new Date(end);
      const edow = endPad.getDay() || 7;
      endPad.setDate(endPad.getDate() + (7 - edow));

      while (cur <= endPad) {
        const ds = cur.toISOString().slice(0, 10);
        const inRange = cur >= start && cur <= end;
        let cls = 'bg-warm-50 text-warm-300';
        if (inRange) {
          if (doneSet.has(ds)) cls = 'bg-green-100 text-green-700';
          else if (failSet.has(ds)) cls = 'bg-red-50 text-red-400';
          else if (cur <= today) cls = 'bg-warm-100 text-warm-500';
          else cls = 'bg-warm-50 text-warm-300';
        }
        cells.push({ key: ds, label: cur.getDate(), cls });
        cur.setDate(cur.getDate() + 1);
      }
      return cells;
    },

    calcHistRate(h) {
      const prog = h.progress || [];
      const target = h.target_days || 1;
      const done = prog.filter(p => p.done).length;
      return done + '/' + target + ' 天 · ' + Math.round(done / target * 100) + '%';
    },
    calcHistPct(h) {
      const prog = h.progress || [];
      const target = h.target_days || 1;
      const done = prog.filter(p => p.done).length;
      return Math.round(done / target * 100);
    },

    async load() {
      checkAuth();
      try {
        const res = await fetch('/api/habits', {headers: API_HEADERS()});
        if (res.status === 401) { localStorage.removeItem('xiaowe_token'); location.href='/web/login'; return; }
        const d = await res.json();
        this.active = d.active || null;
        this.history = d.history || [];
        this.stats = d.stats || this.stats;
      } catch(e) { console.error(e); }
      this.loading = false;
    }
  }
}
</script>
</body>
</html>
