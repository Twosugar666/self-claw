<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>XiaoWe · 设置</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script>
tailwind.config = { theme: { extend: { colors: {
  warm: { 50:'#fdf8f6',100:'#f2e8e5',200:'#eaddd7',300:'#e0cfc7',400:'#d2bab0',500:'#bfa094',600:'#a18072',700:'#977669',800:'#846358',900:'#43302b' }
}}}}
</script>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fdf8f6; }
.toggle { position: relative; width: 44px; height: 24px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle .slider { position: absolute; inset: 0; background: #d2bab0; border-radius: 24px; transition: .3s; cursor: pointer; }
.toggle .slider::before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .3s; }
.toggle input:checked + .slider { background: #977669; }
.toggle input:checked + .slider::before { transform: translateX(20px); }
</style>
</head>
<body class="pb-20" x-data="settingsApp()" x-init="load()">

  <!-- 顶部 -->
  <div class="bg-white border-b border-warm-100 px-4 py-4 flex items-center gap-3">
    <a href="/web/dashboard" class="text-warm-400 hover:text-warm-600 text-lg">←</a>
    <h1 class="text-lg font-bold text-warm-900">⚙️ 设置</h1>
  </div>

  <div class="p-4 space-y-4" x-show="!loading">

    <!-- 个人信息 -->
    <div class="bg-white rounded-xl p-4 shadow-sm">
      <p class="text-sm font-medium text-warm-700 mb-3">个人信息</p>
      <div class="space-y-3">
        <div>
          <label class="text-xs text-warm-500 block mb-1">昵称</label>
          <input type="text" x-model="form.nickname" class="w-full border border-warm-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-warm-400" placeholder="你的昵称">
        </div>
        <div>
          <label class="text-xs text-warm-500 block mb-1">AI 管家名字</label>
          <input type="text" x-model="form.ai_name" class="w-full border border-warm-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-warm-400" placeholder="XiaoWe">
        </div>
      </div>
    </div>

    <!-- 管家人格 -->
    <div class="bg-white rounded-xl p-4 shadow-sm">
      <p class="text-sm font-medium text-warm-700 mb-1">管家人格</p>
      <p class="text-xs text-warm-400 mb-3">用自然语言描述你想要的管家性格和说话方式</p>
      <textarea x-model="form.soul_override" rows="3" class="w-full border border-warm-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-warm-400 resize-none" placeholder="例如：说话简洁直接，偶尔幽默，像一个靠谱的老朋友"></textarea>
    </div>

    <!-- 推送偏好 -->
    <div class="bg-white rounded-xl p-4 shadow-sm">
      <p class="text-sm font-medium text-warm-700 mb-3">推送偏好</p>
      <div class="space-y-4">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm text-warm-800">早报推送</p>
            <p class="text-xs text-warm-400">每天早上发送今日概览</p>
          </div>
          <label class="toggle">
            <input type="checkbox" x-model="form.preferences.morning_report">
            <span class="slider"></span>
          </label>
        </div>
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm text-warm-800">晚间签到</p>
            <p class="text-xs text-warm-400">晚上主动询问今天过得如何</p>
          </div>
          <label class="toggle">
            <input type="checkbox" x-model="form.preferences.evening_checkin">
            <span class="slider"></span>
          </label>
        </div>
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm text-warm-800">陪伴关怀</p>
            <p class="text-xs text-warm-400">检测到情绪低落时主动关心</p>
          </div>
          <label class="toggle">
            <input type="checkbox" x-model="form.preferences.companion">
            <span class="slider"></span>
          </label>
        </div>
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm text-warm-800">深度自问</p>
            <p class="text-xs text-warm-400">定期推送自我探索问题</p>
          </div>
          <label class="toggle">
            <input type="checkbox" x-model="form.preferences.reflect">
            <span class="slider"></span>
          </label>
        </div>
      </div>
    </div>

    <!-- 系统信息 -->
    <div class="bg-white rounded-xl p-4 shadow-sm">
      <p class="text-sm font-medium text-warm-700 mb-3">系统信息</p>
      <div class="space-y-2 text-sm">
        <div class="flex justify-between">
          <span class="text-warm-500">存储模式</span>
          <span class="text-warm-700" x-text="data.storage_mode || 'local'"></span>
        </div>
        <div class="flex justify-between">
          <span class="text-warm-500">技能策略</span>
          <span class="text-warm-700" x-text="skillSummary"></span>
        </div>
        <template x-if="data.role">
          <div class="flex justify-between">
            <span class="text-warm-500">角色</span>
            <span class="text-warm-700" x-text="data.role"></span>
          </div>
        </template>
      </div>
    </div>

    <!-- 保存按钮 -->
    <button @click="save()" :disabled="saving" class="w-full bg-warm-700 hover:bg-warm-800 disabled:bg-warm-300 text-white rounded-xl py-3 text-sm font-medium transition">
      <span x-show="!saving">保存修改</span>
      <span x-show="saving">保存中...</span>
    </button>

    <!-- 保存提示 -->
    <div x-show="saveMsg" x-transition class="text-center text-sm" :class="saveOk ? 'text-green-600' : 'text-red-500'" x-text="saveMsg"></div>

    <!-- 反馈建议 -->
    <div class="bg-white rounded-xl p-4 shadow-sm">
      <p class="text-sm font-medium text-warm-700 mb-2">💬 反馈建议</p>
      <textarea x-model="feedbackText" rows="3" class="w-full border border-warm-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-warm-400 resize-none" placeholder="告诉我们你的想法..."></textarea>
      <button @click="submitFeedback()" :disabled="!feedbackText.trim() || feedbackSending" class="mt-2 w-full bg-warm-600 hover:bg-warm-700 disabled:bg-warm-300 text-white rounded-lg py-2 text-sm transition">
        <span x-text="feedbackSending ? '提交中...' : '提交反馈'"></span>
      </button>
      <div x-show="feedbackMsg" x-transition class="text-center text-xs mt-2 text-green-600" x-text="feedbackMsg"></div>
    </div>
  </div>

  <div x-show="loading" class="flex items-center justify-center h-64">
    <p class="text-warm-400">加载中...</p>
  </div>

  <!-- 底部导航 -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-warm-100 flex justify-around py-2 text-xs">
    <a href="/web/dashboard" class="flex flex-col items-center text-warm-400"><span class="text-lg">📊</span>概览</a>
    <a href="/web/notes" class="flex flex-col items-center text-warm-400"><span class="text-lg">📝</span>速记</a>
    <a href="/web/todos" class="flex flex-col items-center text-warm-400"><span class="text-lg">✅</span>待办</a>
    <a href="/web/daily" class="flex flex-col items-center text-warm-400"><span class="text-lg">📖</span>日记</a>
    <a href="/web/archive" class="flex flex-col items-center text-warm-400"><span class="text-lg">📁</span>笔记</a>
  </nav>

<script>
const API_HEADERS = () => ({'X-Token': localStorage.getItem('xiaowe_token')||'', 'Content-Type': 'application/json'});
function checkAuth() { if(!localStorage.getItem('xiaowe_token')) location.href='/web/login'; }

function settingsApp() {
  return {
    data: {}, loading: true, saving: false,
    saveMsg: '', saveOk: false,
    feedbackText: '', feedbackSending: false, feedbackMsg: '',
    form: {
      nickname: '', ai_name: '', soul_override: '',
      preferences: { morning_report: true, evening_checkin: true, companion: true, reflect: true }
    },
    get skillSummary() {
      const mode = this.data.skills_mode || 'blacklist';
      const list = this.data.skills_list || [];
      if (mode === 'blacklist') {
        return list.length === 0 ? '全部启用' : '禁用 ' + list.length + ' 个';
      }
      return '启用 ' + list.length + ' 个';
    },
    async load() {
      checkAuth();
      try {
        const res = await fetch('/api/settings', {headers: API_HEADERS()});
        if (res.status === 401) { localStorage.removeItem('xiaowe_token'); location.href='/web/login'; return; }
        this.data = await res.json();
        this.form.nickname = this.data.nickname || '';
        this.form.ai_name = this.data.ai_name || 'XiaoWe';
        this.form.soul_override = this.data.soul_override || '';
        if (this.data.preferences) {
          this.form.preferences = { ...this.form.preferences, ...this.data.preferences };
        }
      } catch(e) { console.error(e); }
      this.loading = false;
    },
    async save() {
      this.saving = true; this.saveMsg = '';
      try {
        const res = await fetch('/api/settings', {
          method: 'POST', headers: API_HEADERS(),
          body: JSON.stringify(this.form),
        });
        const d = await res.json();
        if (d.ok) {
          this.saveMsg = d.changed ? '✓ 已保存' : '没有变更';
          this.saveOk = true;
          if (this.form.nickname) localStorage.setItem('xiaowe_nickname', this.form.nickname);
        } else {
          this.saveMsg = '保存失败：' + (d.error || '未知错误');
          this.saveOk = false;
        }
      } catch(e) {
        this.saveMsg = '网络错误'; this.saveOk = false;
      }
      this.saving = false;
      setTimeout(() => this.saveMsg = '', 3000);
    },
    async submitFeedback() {
      if (!this.feedbackText.trim()) return;
      this.feedbackSending = true; this.feedbackMsg = '';
      try {
        const res = await fetch('/api/feedback', {
          method: 'POST', headers: API_HEADERS(),
          body: JSON.stringify({ content: this.feedbackText.trim() }),
        });
        const d = await res.json();
        if (d.ok) {
          this.feedbackMsg = '✓ 感谢反馈！';
          this.feedbackText = '';
        }
      } catch(e) { console.error(e); }
      this.feedbackSending = false;
      setTimeout(() => this.feedbackMsg = '', 3000);
    }
  }
}
</script>
</body>
</html>
