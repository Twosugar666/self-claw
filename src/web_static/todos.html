<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>XiaoWe · 待办</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script>
tailwind.config = { theme: { extend: { colors: {
  warm: { 50:'#fdf8f6',100:'#f2e8e5',200:'#eaddd7',300:'#e0cfc7',400:'#d2bab0',500:'#bfa094',600:'#a18072',700:'#977669',800:'#846358',900:'#43302b' }
}}}}
</script>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fdf8f6; }
</style>
</head>
<body class="pb-20" x-data="todoApp()" x-init="load()">
  <div class="bg-white border-b border-warm-100 px-4 py-3 flex items-center justify-between">
    <h1 class="text-lg font-bold text-warm-900">✅ 待办</h1>
    <div class="flex gap-2 text-xs">
      <button @click="filter='all'" :class="filter==='all'?'bg-warm-700 text-white':'bg-warm-100 text-warm-600'" class="px-3 py-1 rounded-full transition">全部</button>
      <button @click="filter='pending'" :class="filter==='pending'?'bg-warm-700 text-white':'bg-warm-100 text-warm-600'" class="px-3 py-1 rounded-full transition">进行中</button>
      <button @click="filter='done'" :class="filter==='done'?'bg-warm-700 text-white':'bg-warm-100 text-warm-600'" class="px-3 py-1 rounded-full transition">已完成</button>
    </div>
  </div>

  <div class="p-4 space-y-2" x-show="!loading">
    <!-- 进行中 -->
    <template x-if="filter!=='done'">
      <div>
        <p class="text-xs text-warm-500 mb-2 font-medium" x-show="pending.length">
          进行中 (<span x-text="pending.length"></span>)
        </p>
        <template x-for="(item,i) in pending" :key="item.content + '_' + i">
          <div class="bg-white rounded-xl p-3 shadow-sm flex items-center gap-2 mb-2 transition-all"
               :class="item._done ? 'opacity-40 scale-95' : ''">
            <button @click="completeTodo(i, item)"
                    class="shrink-0 w-6 h-6 rounded-full border-2 flex items-center justify-center active:scale-90 transition-all"
                    :class="item._done ? 'border-green-400 bg-green-50' : 'border-warm-300 hover:border-warm-500'"
                    :disabled="busy || item._done">
              <span x-show="item._loading" class="text-xs animate-spin">⏳</span>
              <span x-show="item._done && !item._loading" class="text-xs text-green-500">✓</span>
              <span x-show="!item._loading && !item._done" class="text-xs text-transparent hover:text-warm-400">✓</span>
            </button>
            <p class="text-sm flex-1" :class="item._done ? 'text-warm-400 line-through' : 'text-warm-800'" x-text="item.content"></p>
            <span x-show="item._checkin" class="text-xs text-green-600 whitespace-nowrap">今日已打卡 🔁</span>
          </div>
        </template>
      </div>
    </template>
    <!-- 已完成 -->
    <template x-if="filter!=='pending'">
      <div>
        <p class="text-xs text-warm-500 mb-2 font-medium mt-4" x-show="done.length">
          已完成 (<span x-text="done.length"></span>)
        </p>
        <template x-for="(item,i) in done" :key="'d'+i">
          <div class="bg-white rounded-xl p-3 shadow-sm flex items-start gap-2 opacity-60">
            <span class="text-green-500 mt-0.5">✅</span>
            <p class="text-sm text-warm-600 flex-1 line-through" x-text="item.content"></p>
          </div>
        </template>
      </div>
    </template>
    <div x-show="!pending.length && !done.length" class="text-center py-16">
      <p class="text-4xl mb-3">📋</p>
      <p class="text-warm-600 font-medium">还没有待办事项</p>
      <p class="text-warm-400 text-sm mt-1">在企微告诉 XiaoWe 你要做的事就好</p>
      <p class="text-warm-400 text-xs mt-3">💡 试试说：「提醒我明天买猫粮」</p>
    </div>
  </div>

  <div x-show="loading" class="flex items-center justify-center h-64">
    <p class="text-warm-400">加载中...</p>
  </div>

  <!-- Toast -->
  <div x-show="toast" x-transition
       class="fixed top-16 left-1/2 -translate-x-1/2 bg-warm-800 text-white text-sm px-4 py-2 rounded-xl shadow-lg z-50"
       x-text="toast"></div>

  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-warm-100 flex justify-around py-2 text-xs">
    <a href="/web/dashboard" class="flex flex-col items-center text-warm-400"><span class="text-lg">📊</span>概览</a>
    <a href="/web/notes" class="flex flex-col items-center text-warm-400"><span class="text-lg">📝</span>速记</a>
    <a href="/web/todos" class="flex flex-col items-center text-warm-700 font-medium"><span class="text-lg">✅</span>待办</a>
    <a href="/web/daily" class="flex flex-col items-center text-warm-400"><span class="text-lg">📖</span>日记</a>
    <a href="/web/archive" class="flex flex-col items-center text-warm-400"><span class="text-lg">📁</span>笔记</a>
  </nav>

<script>
const API_HEADERS = () => ({'X-Token': localStorage.getItem('xiaowe_token')||''});
function checkAuth() { if(!localStorage.getItem('xiaowe_token')) location.href='/web/login'; }

function todoApp() {
  return {
    pending: [], done: [], loading: true, filter: 'all', busy: false, toast: '',
    async load() {
      checkAuth();
      try {
        const r = await fetch('/api/todos', {headers: API_HEADERS()});
        if (r.status === 401) { localStorage.removeItem('xiaowe_token'); location.href='/web/login'; return; }
        const d = await r.json();
        this.pending = (d.pending || []).map(p => ({...p, _loading: false, _done: false, _checkin: false}));
        this.done = d.done || [];
      } catch(e) { console.error(e); }
      this.loading = false;
    },
    async completeTodo(idx, item) {
      if (this.busy || item._done || item._loading) return;
      this.busy = true;
      item._loading = true;
      try {
        const res = await fetch('/api/todos/complete', {
          method: 'POST',
          headers: {...API_HEADERS(), 'Content-Type': 'application/json'},
          body: JSON.stringify({keyword: item.content})
        });
        const data = await res.json();
        if (data.ok) {
          if (data.reply && data.reply.includes('🔁')) {
            item._checkin = true;
            item._loading = false;
            this.showToast('打卡成功 ✅🔁');
          } else {
            item._done = true;
            item._loading = false;
            setTimeout(() => {
              const i = this.pending.indexOf(item);
              if (i >= 0) {
                this.pending.splice(i, 1);
                this.done.unshift({content: item.content, done: true});
              }
            }, 600);
          }
        } else {
          item._loading = false;
          this.showToast(data.reply || data.error || '操作失败');
        }
      } catch(e) {
        console.error(e);
        item._loading = false;
        this.showToast('网络错误');
      } finally {
        this.busy = false;
      }
    },
    showToast(msg) {
      this.toast = msg;
      setTimeout(() => this.toast = '', 3000);
    }
  }
}
</script>
</body>
</html>
